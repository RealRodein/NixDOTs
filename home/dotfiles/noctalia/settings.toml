[backdrop]
blur_intensity = 0.14999999664723873
tint_intensity = 0.0

[bar]
order = [ "Main" ]

    [bar.Main]
    background_opacity = 0.39999999105930328
    capsule = true
    capsule_fill = "on_primary"
    capsule_opacity = 0.20000000000000001
    capsule_padding = 10.0
    capsule_radius = 11
    center = [ "media", "active_window", "audio_visualizer" ]
    end = [ "tray", "battery", "notifications", "network", "clock", "control-center" ]
    margin_edge = 5
    margin_ends = 5
    padding = 0
    radius = 14
    scale = 1.0500000081956387
    start = [ "launcher", "spacer_1", "workspaces" ]
    thickness = 40
    widget_spacing = 8

[control_center]
sidebar = "full"

[desktop_widgets]
enabled = false
schema_version = 1
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
background_opacity = 0.40000000000000002
cross_axis_padding = 0
enabled = true
icon_size = 30
inactive_opacity = 0.4999999888241291
inactive_scale = 0.65000000968575478
item_spacing = 0
magnification = false
main_axis_padding = 9
margin_edge = 5
padding = 1
radius = 14
reserve_space = true
show_dots = true
show_instance_count = false

[hooks]
started = "noctalia msg action screen-lock & /home/rodein/NixDOTs/home/dotfiles/my-scripts/startapps.sh"

[idle]
behavior_order = [ "lock", "screen-off", "suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660

    [idle.behavior.suspend]
    action = "suspend"
    enabled = true
    lock_before_suspend = true
    timeout = 900

[location]
auto_locate = true

[lockscreen]
blurred_desktop = true

[lockscreen_widgets]
enabled = false
schema_version = 1
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    cx = 960.0
    cy = 1077.0
    output = "eDP-1"
    rotation = 0.0
    scale = 1.0
    type = "login_box"

[notification]
allowed_urgencies = [ "low", "normal", "critical" ]
background_opacity = 0.39999999105930328
layer = "overlay"
offset_x = 5
offset_y = 5
scale = 0.90000000596046448

[osd]
background_opacity = 0.9499999787658453
keyboard_layout = false
offset_x = 5
offset_y = 0
position = "bottom_left"

[shell]
font_family = "Inter"
lang = "en"
settings_show_advanced = true
telemetry_enabled = false
ui_scale = 0.85000000521540642

    [shell.animation]
    speed = 3.0000000447034836

    [shell.panel]
    borders = false
    clipboard_placement = "floating"
    control_center_placement = "floating"
    launcher_placement = "floating"
    open_near_click_clipboard = true
    open_near_click_control_center = true
    open_near_click_launcher = true
    open_near_click_session = true
    open_near_click_wallpaper = true
    session_placement = "floating"
    transparency_mode = "glass"
    wallpaper_placement = "floating"

    [shell.screen_corners]
    enabled = true
    size = 25

    [shell.shadow]
    alpha = 0.99999997764825821
    direction = "down_right"

[system.monitor]
gpu_poll_seconds = 10

[theme]
source = "wallpaper"
wallpaper_scheme = "faithful"

    [theme.templates]
    builtin_ids = [ "btop", "gtk3", "gtk4", "ghostty", "niri", "qt" ]
    community_ids = [ "neovim", "discord", "steam", "yazi" ]

[wallpaper]
directory = "/home/rodein/Pictures/Wallpapers"

    [wallpaper.default]
    path = "/home/rodein/Pictures/Wallpapers/wallhaven-8gr6l2.jpg"

    [wallpaper.last]
    path = "/home/rodein/Pictures/Wallpapers/wallhaven-8gr6l2.jpg"

    [wallpaper.monitors.eDP-1]
    path = "/home/rodein/Pictures/Wallpapers/wallhaven-8gr6l2.jpg"

[weather]
auto_locate = true

[widget.active_window]
max_length = 400
title_scroll = "on_hover"

[widget.audio_visualizer]
centered = false
width = 300.0

[widget.clock]
format = "{:%H:%M}    {:%d.%m}"

[widget.control-center]
capsule = true
capsule_opacity = 0.0
capsule_padding = 10.0
scale = 1.2

[widget.launcher]
capsule = true
capsule_opacity = 0.0
capsule_radius = "auto"
custom_image = "/home/rodein/.local/state/noctalia/logos/nix-snowflake-white.svg"
glyph = ""
scale = 1.2

[widget.media]
art_size = 50.0
capsule_padding = 4.0
capsule_radius = 10
hide_when_no_media = true
max_length = 300
min_length = 0
scale = 0.94999999999999996
title_scroll = "on_hover"

[widget.network]
show_label = false

[widget.spacer_1]
length = 10
type = "spacer"

[widget.spacer_2]
type = "spacer"

[widget.tray]
capsule = true
capsule_opacity = 0.0
capsule_radius = 10.0
drawer = true

[widget.workspaces]
display = "none"